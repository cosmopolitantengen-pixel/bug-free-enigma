name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_company_os_test
          POSTGRES_USER: ai_company_os
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_company_os -d ai_company_os_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      AI_COMPANY_OS_TEST_POSTGRES_URL: postgresql://ai_company_os:test-password@localhost:5432/ai_company_os_test
      AI_COMPANY_OS_TEST_REDIS_URL: redis://localhost:6379/0
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m compileall -q backend/app backend/tests
      - name: Run backend suite with PostgreSQL and pgvector
        run: python -m unittest discover -s backend/tests
      - name: Run release gate
        run: python scripts/release_gate.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Type-check web console
        run: npm run typecheck
      - name: Build web console
        run: npm run build
      - name: Run web browser E2E
        run: npm run e2e
