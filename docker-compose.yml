services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_company_os}
      POSTGRES_USER: ${POSTGRES_USER:-ai_company_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AI_COMPANY_OS_DATABASE_URL: postgresql://${POSTGRES_USER:-ai_company_os}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ai_company_os}
      AI_COMPANY_OS_REDIS_URL: redis://redis:6379/0
      AI_COMPANY_OS_AUTH_REQUIRED: ${AI_COMPANY_OS_AUTH_REQUIRED:-false}
      AI_COMPANY_OS_API_TOKEN: ${AI_COMPANY_OS_API_TOKEN:-}
      AI_COMPANY_OS_API_TOKEN_SHA256: ${AI_COMPANY_OS_API_TOKEN_SHA256:-}
      AI_COMPANY_OS_MODEL_PROVIDER: ${AI_COMPANY_OS_MODEL_PROVIDER:-local}
      AI_COMPANY_OS_MODEL_NAME: ${AI_COMPANY_OS_MODEL_NAME:-gpt-4.1-mini}
      AI_COMPANY_OS_ALLOWED_MODELS: ${AI_COMPANY_OS_ALLOWED_MODELS:-gpt-4.1-mini}
      AI_COMPANY_OS_EMBEDDING_PROVIDER: ${AI_COMPANY_OS_EMBEDDING_PROVIDER:-disabled}
      AI_COMPANY_OS_EMBEDDING_MODEL: ${AI_COMPANY_OS_EMBEDDING_MODEL:-text-embedding-3-small}
      AI_COMPANY_OS_PROVIDER_TIMEOUT_SECONDS: ${AI_COMPANY_OS_PROVIDER_TIMEOUT_SECONDS:-60}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    build:
      context: apps/web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  scheduler-dispatcher:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.scheduler.dispatcher"]
    environment:
      AI_COMPANY_OS_DATABASE_URL: postgresql://${POSTGRES_USER:-ai_company_os}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ai_company_os}
      AI_COMPANY_OS_REDIS_URL: redis://redis:6379/0
      AI_COMPANY_OS_SCHEDULER_POLL_SECONDS: ${SCHEDULER_POLL_SECONDS:-5}
      AI_COMPANY_OS_MODEL_PROVIDER: ${AI_COMPANY_OS_MODEL_PROVIDER:-local}
      AI_COMPANY_OS_MODEL_NAME: ${AI_COMPANY_OS_MODEL_NAME:-gpt-4.1-mini}
      AI_COMPANY_OS_ALLOWED_MODELS: ${AI_COMPANY_OS_ALLOWED_MODELS:-gpt-4.1-mini}
      AI_COMPANY_OS_EMBEDDING_PROVIDER: ${AI_COMPANY_OS_EMBEDDING_PROVIDER:-disabled}
      AI_COMPANY_OS_EMBEDDING_MODEL: ${AI_COMPANY_OS_EMBEDDING_MODEL:-text-embedding-3-small}
      AI_COMPANY_OS_PROVIDER_TIMEOUT_SECONDS: ${AI_COMPANY_OS_PROVIDER_TIMEOUT_SECONDS:-60}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "ai-company-os-scheduler"]
    environment:
      AI_COMPANY_OS_DATABASE_URL: postgresql://${POSTGRES_USER:-ai_company_os}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ai_company_os}
      AI_COMPANY_OS_REDIS_URL: redis://redis:6379/0
      AI_COMPANY_OS_MODEL_PROVIDER: ${AI_COMPANY_OS_MODEL_PROVIDER:-local}
      AI_COMPANY_OS_MODEL_NAME: ${AI_COMPANY_OS_MODEL_NAME:-gpt-4.1-mini}
      AI_COMPANY_OS_ALLOWED_MODELS: ${AI_COMPANY_OS_ALLOWED_MODELS:-gpt-4.1-mini}
      AI_COMPANY_OS_EMBEDDING_PROVIDER: ${AI_COMPANY_OS_EMBEDDING_PROVIDER:-disabled}
      AI_COMPANY_OS_EMBEDDING_MODEL: ${AI_COMPANY_OS_EMBEDDING_MODEL:-text-embedding-3-small}
      AI_COMPANY_OS_PROVIDER_TIMEOUT_SECONDS: ${AI_COMPANY_OS_PROVIDER_TIMEOUT_SECONDS:-60}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
